<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Esqueleto de Etiquetas</title>
</head>
<body>

    <!-- SECCIÓN DE TABLAS -->
    <table> <!-- Contenedor de la tabla -->
        <thead> <!-- Encabezado de la tabla (opcional pero recomendado) -->
            <tr> <!-- Fila de encabezado -->
                <th></th> <!-- Celda de título -->
            </tr>
        </thead>
        <tbody> <!-- Cuerpo de la tabla -->
            <tr> <!-- Fila de datos -->
                <td></td> <!-- Celda de información -->
            </tr>
        </tbody>
    </table>

    <br><hr><br>

    <!-- SECCIÓN DE FORMULARIOS -->
    <form action="" method=""> <!-- Contenedor: 'action' es a dónde va la info, 'method' es cómo (GET/POST) -->
        
        <label for="id_unico"></label> <!-- Etiqueta vinculada al input mediante el ID -->
        
        <input type="text"> <!-- Entrada de texto simple -->
        <input type="password"> <!-- Entrada protegida (asteriscos) -->
        <input type="email"> <!-- Validación básica de correo -->
        <input type="radio"> <!-- Opción única circular -->
        <input type="checkbox"> <!-- Opción múltiple cuadrada -->
        
        <select> <!-- Menú desplegable -->
            <option value=""></option> <!-- Opción individual -->
        </select>

        <textarea></textarea> <!-- Cuadro de texto multilínea -->

        <button type="submit">Enviar</button> <!-- Botón para procesar el formulario -->
        
    </form>

</body>
</html>
