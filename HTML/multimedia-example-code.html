<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multimedia Example Code</title>
</head>

<body>

    <main>
        <video width="640" height="360" controls poster="miniatura-video.jpg">
            <source src="viddemo.mp4" type="video/mp4" alt="Un vídeo MP4">
            <source src="viddemo.webm" type="video/webm" alt="Un vídeo WEBM">
            El navegador no soporta la reproducción de vídeo
        </video>

        <!--Etiqueta AUDIO-->
        <audio controls>
            <source src="podcast.mp3" type="audio/mpeg">
            <source src="podcast.ogg" type="audio/ogg">
            Este navegador no soporta audio HTML5
        </audio>

        <!--Source y Track-->
        <video controls>
            <source src="pelicula.mp4" type="video/mp4">
            <track src="subtitulos-es.vtt" kind="subtitles" srclang="es" label="Español">
            </track>
            <track src="subtitulos-en.vtt" kind="subtitles" srclang="en" label="Inglés">
            </track>
        </video>

        <!--Etiqueta IFRAME-->
        <iframe width="560" height="315" src="https://www.youtube.com/embed/ejemplo" frameborder="0"
            allowfullscreen></iframe>
    </main>

</body>

</html>
