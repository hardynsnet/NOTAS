<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multimedia Content</title>
</head>

<body>

    <main>

        <!--Etiqueta de vídeo, esta tiene atributos controls-->
        <video src=""></video>

        <!--Etiqueta AUDIO-->
        <audio src=""></audio>

        <!--Etiqueta source, esta va dentro de la etiqueta vídeo-->
        <!-- Se usa para especificar la reproducción de múltiples formatos-->
        <video src="" controls>
        </video>

        <!--Etiqueta IFRAME-->
        <p>Es usada para insertar contenido de terceros, como videos de YouTube o mapas de Google</p>
        <iframe src="" frameborder="0"></iframe>

        <ul>
            <p>Otros atributos comunes</p>
            <!--Ruta de archivo multimedia-->
            <li>src</li>
            <!--Especifica el formato (MIME type) para ayudar al navegador-->
            <li>type</li>
            <!--Configura peticiones CORS para recursos de otros dominios-->
            <li>crossorigen</li>
            <!--En móviles, permite que el vídeo se reproduzca en el cuerpo de la web en lugar de pantalla completa-->
            <li>playsinline</li>
        </ul>

    </main>

</body>

</html>
